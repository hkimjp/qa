services:
  qa:
    image: eclipse-temurin:25_36-jre-jammy
    env_file: ".env"
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
      - m2:/root/.m2
    ports:
      - localhost:8530:8530
    entrypoint: >
      sh -c "java --enable-native-access=ALL-UNNAMED -jar qa.jar"

  db:
    image: postgres:18
    volumes:
      - data:/var/lib/postgresql

volumes:
  m2:
    external: true
  data:
    driver: local
